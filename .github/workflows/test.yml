name: Manual Test RAM Optimizer

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - full

jobs:
  test:
    name: Test on GitHub Runner (Azure kernel)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y bc util-linux

      - name: Check zRAM support
        id: check_zram
        run: |
          if modinfo zram &>/dev/null; then
            echo "supported=true" >> $GITHUB_OUTPUT
            echo "zRAM module exists"
          else
            echo "supported=false" >> $GITHUB_OUTPUT
            echo "⚠️ zRAM not supported in this kernel (Azure). Full test will be skipped."
          fi

      - name: Make script executable
        run: chmod +x ram-opt.sh

      - name: Dry-run test (always runs)
        run: sudo ./ram-opt.sh --dry-run

      - name: Full test (only if zRAM supported and mode = full)
        if: steps.check_zram.outputs.supported == 'true' && github.event.inputs.test_mode == 'full'
        run: echo -e "y\nn" | sudo ./ram-opt.sh

      - name: Show status (if zRAM supported)
        if: steps.check_zram.outputs.supported == 'true'
        run: sudo ./ram-opt.sh --status

      - name: Reminder for full test on real hardware
        if: steps.check_zram.outputs.supported == 'false' && github.event.inputs.test_mode == 'full'
        run: |
          echo "============================================="
          echo "⚠️  Full test requires a machine with zRAM kernel module."
          echo "    GitHub runners use Azure kernel without zRAM."
          echo "    To test fully, run on your own machine or a VM with standard kernel."
          echo "============================================="
