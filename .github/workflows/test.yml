name: Manual Test RAM Optimizer on VM

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (dry-run or full)'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - full

jobs:
  test-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y bc util-linux

      - name: Load zRAM kernel module
        run: |
          sudo modprobe zram
          lsmod | grep zram || echo "zRAM module loaded"

      - name: Make script executable
        run: chmod +x ram-opt.sh

      - name: Dry-run test
        if: github.event.inputs.test_mode == 'dry-run'
        run: sudo ./ram-opt.sh --dry-run

      - name: Full test (non-interactive)
        if: github.event.inputs.test_mode == 'full'
        run: |
          # Automatically answer 'y' to proceed, 'n' to reboot
          echo -e "y\nn" | sudo ./ram-opt.sh

      - name: Show final status
        if: always()
        run: sudo ./ram-opt.sh --status
